<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>OfiChaos - El caos de la oficina</title>
  <link rel="icon" href="data:,">
  <style>
    :root {
      color-scheme: light;
      --ofc-ink: #172554;
      --ofc-border: #15203a;
      --ofc-primary: #2563eb;
      --ofc-task: #f6c344;
      --ofc-bg: #dbeafe;
      --ofc-surface: #ffffff;
      --ofc-muted: #475569;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; }
    body { background: var(--ofc-bg); color: var(--ofc-ink); font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; overflow: hidden; }
    #game-container { width: 100vw; height: 100dvh; min-height: 100%; position: relative; }
    canvas { display: block; }
    #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 20px; font-weight: 800; color: var(--ofc-primary); }
    .hidden { display: none !important; }
    .sr-only { position: absolute !important; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0; }

    .ofc-entry { color: var(--ofc-ink); font: 700 14px/1.2 system-ui, sans-serif; }
    .ofc-fields, .ofc-actions { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); gap: 12px; }
    .ofc-fields label { display: grid; gap: 6px; }
    .ofc-entry input {
      width: 100%; height: 46px; padding: 0 12px; border: 2px solid var(--ofc-border);
      border-radius: 8px; background: #f8fafc; color: var(--ofc-ink); font: 700 16px/1 system-ui, sans-serif;
      outline: none; box-shadow: inset 0 -3px 0 #cbd5e1;
    }
    .ofc-entry input::placeholder { color: #64748b; opacity: 1; }
    .ofc-entry input:focus-visible { border-color: var(--ofc-primary); box-shadow: 0 0 0 3px #bfdbfe; }
    .ofc-entry input[name="code"] { text-transform: uppercase; letter-spacing: .1em; }
    .ofc-actions { margin-top: 12px; }
    .ofc-entry button {
      min-height: 48px; padding: 0 12px; border: 2px solid var(--ofc-border); border-radius: 12px;
      background: var(--ofc-primary); color: #fff; font: 800 15px/1 system-ui, sans-serif;
      box-shadow: 0 5px 0 var(--ofc-border); cursor: pointer; touch-action: manipulation;
    }
    .ofc-entry button:hover { background: var(--ofc-ink); }
    .ofc-entry button:focus-visible { outline: 3px solid #60a5fa; outline-offset: 3px; }
    .ofc-entry button:active { transform: translateY(3px); box-shadow: 0 2px 0 var(--ofc-border); }
    .ofc-entry .ofc-demo {
      display: flex; align-items: center; justify-content: center; gap: 8px; width: min(100%, 280px);
      min-height: 42px; margin: 14px auto 0; background: var(--ofc-task); color: var(--ofc-ink); font-size: 14px;
    }
    .ofc-flask { width: 14px; height: 18px; border: 2px solid currentColor; border-top: 0; border-radius: 2px 2px 6px 6px; position: relative; }
    .ofc-flask::before { content: ""; position: absolute; width: 6px; height: 6px; border: 2px solid currentColor; border-bottom: 0; left: 2px; top: -6px; }
    @media (max-width: 679px) {
      .ofc-fields, .ofc-actions { grid-template-columns: 1fr; gap: 9px; }
      .ofc-actions { margin-top: 10px; }
      .ofc-entry .ofc-demo { margin-top: 12px; }
    }
    @media (max-height: 699px) {
      .ofc-entry input { height: 42px; }
      .ofc-entry button { min-height: 44px; }
      .ofc-entry .ofc-demo { min-height: 38px; margin-top: 10px; }
      .ofc-actions { margin-top: 8px; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { scroll-behavior: auto !important; transition: none !important; animation: none !important; }
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="loading">Cargando OfiChaos…</div>
  </div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  <script src="src/main.js" type="module"></script>
</body>
</html>
